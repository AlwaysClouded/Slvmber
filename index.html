<!-- DISCORD PRESENCE PANEL -->
<div class="presence-card">
  <div class="presence-header">
    <span class="presence-dot" id="dp-status-dot"></span>
    <span class="presence-username" id="dp-username">Loading...</span>
  </div>

  <div class="presence-body">
    <img id="dp-avatar" class="presence-avatar" src="https://cdn.discordapp.com/embed/avatars/0.png" />
    <p id="dp-custom-status" class="presence-custom">Connecting...</p>
  </div>
</div>

<!-- SPOTIFY PANEL -->
<div class="spotify-card">
  <div class="spotify-header">LISTENING NOW</div>
  <div class="spotify-body">
    <img id="spotify-cover" class="spotify-cover" src="https://i.imgur.com/8QfQFfC.png" />
    <div class="spotify-meta">
      <div id="spotify-title" class="spotify-title">Not playing anything</div>
      <div id="spotify-artist" class="spotify-artist"></div>
    </div>
  </div>
</div>
